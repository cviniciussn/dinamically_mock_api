services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mockserver
      POSTGRES_PASSWORD: mockserver
      POSTGRES_DB: mockserver
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockserver"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mockserver
      DB_USER: mockserver
      DB_PASSWORD: mockserver
      PORT: 3001
      HTTPS_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
